<!DOCTYPE html>
<html>
<head>
<title>WT_K</title>

<style>
body{
    background-color: rgb(252, 252, 252);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}


input.form-control{
    width: 300px;
    height: 40px;
    font-size: 16px;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid gray;
    box-sizing: border-box;
}


table{
   border: 5px solid rgb(0, 0, 0);
   padding: 50px;
   background-color: cornflowerblue;
   
}


.table-heading{
    font-size: 28px;
    font-weight: bold;
    color: rgb(249, 249, 249);
    text-align: center;
    padding-bottom: 20px;
}

tr{
    height: 60px;
}


.btn{
    width: 300px;
    height: 40px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn{
    background-color: royalblue;
    color: white;
}

.btn:hover{
    background-color: darkblue;
}
</style>

</head>

<body>

<form>
<table>

<tr>
<td class="table-heading">
Registration Form
</td>
</tr>

<tr>
<td>
<input autocomplete="off" class="form-control" 
placeholder="First Name" type="text" required>
</td>
</tr>

<tr>
<td>
<input autocomplete="off" class="form-control" 
placeholder="Last Name" type="text" required>
</td>
</tr>

<tr>
<td>
<input autocomplete="off" class="form-control" 
placeholder="Email Address" type="email" required>
</td>
</tr>

<tr>
<td>
<input autocomplete="off" class="form-control" 
placeholder="Age" type="number" required>
</td>
</tr>

<tr>
<td>
<input autocomplete="off" class="form-control" 
type="date" required>
</td>
</tr>

<tr>
<td style="text-align:center; padding-top:10px;">
<button type="submit" class="btn btn">
Submit
</button>
</td>
</tr>

</table>
</form>

</body>
</html>
