<!DOCTYPE html>

<html>
      <head>
            <meta charset="UTF-8">
              <title>University Admission Form</title>
              
      <head>

      <body>

        
        <h1>University online admission form</h1>
        <form action="#" method="post" enctype="multipart/form-data">

        <fieldset>
            <legend>Personal information</legend>

            <label for="fullname">Full name :  </label>    <input type="text" id="fullname" name="fullname" ><br><br>

            <label for="email">Email address :  </label>  <input type="email" id="email" name="email" ><br><br>

            <label for="dob">Date of Birth :  </label> <input type="date" id="dob" name="dob"><br><br>
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="Male" >
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">other</label>
            <br><br>

            <label for="phone">Phone Number :</label> <input type="text" id="phone" name="phone"><br><br>

            <label for="address">Address :</label> <input type="text" id="address" name="address"><br><br>

        </fieldset>
<br>
        <fieldset>
            <legend>Academic Information</legend>
             <label for="school">School Name:</label>  <input type="text" id="school" name="school" >     <label for="sscgpa">SSC GPA:</label>  <input type="text" id="sscgpa" name="sscgpa" ><br><br>
             <label for="college">College Name:</label>  <input type="text" id="college" name="college" >      <label for="hscgpa">HSC GPA:</label>  <input type="text" id="hscgpa" name="hscgpa" ><br><br>

             <label for="department">Preferred Department:</label>
            <select id="department" name="department" >
                <option value="">-- Select Department --</option>
                <option value="cse">CSE</option>
                <option value="eee">EEE</option>
                <option value="bba">BBA</option>
                <option value="english">ENG</option>
                <option value="llb">LLB</option>
            </select><br><br>

        </fieldset>
<br>
        <Fieldset>
              <legend>Required Documents</legend>
               <label for="photo">Upload Passport Size Photo:</label>
            <input type="file" id="photo" name="photo" accept="image/*" ><br><br>

            <label for="transcript">Upload Academic Transcript:</label>
            <input type="file" id="transcript" name="transcript" accept=".pdf,.jpg,.png"><br><br>

        </Fieldset>
 <input type="submit" value="Submit Application">
        <input type="reset" value="Reset Form">
        </form>


      <body>

<html>
